{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Cart | CR7 Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0f0c29; color: white; text-align: center; padding: 50px; }
        .cart-container { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; max-width: 600px; margin: 0 auto; border: 1px solid rgba(255,255,255,0.1); }
        .item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding: 15px 0; }
        .checkout-btn { background: #00d2ff; color: white; padding: 15px 30px; border-radius: 50px; text-decoration: none; display: inline-block; margin-top: 20px; font-weight: bold; }

        /* Ensure your cart items use flexbox to align the button to the right */
        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .remove-btn {
            color: #ff4d4d; /* Bright red to stand out */
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            margin-left: 15px;
            transition: transform 0.2s;
            display: inline-block;
        }

        .remove-btn:hover {
            transform: scale(1.2);
            color: #ff0000;
        }
    </style>
</head>
<body>
    <h1>YOUR CART</h1>
    
    <div class="cart-container">
        {% if cart_items %}
            {% for item in cart_items %}
            <div class="cart-item" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 15px 0;">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <img src="{{ item.image.url }}" style="width: 50px; border-radius: 5px;">
                    <span style="font-size: 0.9rem;">{{ item.name }}</span>
                </div>
                
                <div style="display: flex; align-items: center; gap: 15px;">
                    <span style="color: #00ffcc; font-weight: bold;">₹{{ item.price }}</span>
                    
                    <a href="{% url 'remove_from_cart' item.id %}" style="color: #ff4d4d; text-decoration: none; font-size: 1.2rem; font-weight: bold; padding: 0 5px;">
                        &times;
                    </a>
                </div>
            </div>
            {% endfor %}

            <div style="text-align: center; margin-top: 30px;">
                <a href="{% url 'checkout' %}" class="checkout-btn">PROCEED TO PAY</a>
            </div>

        {% else %}
            <p>Your cart is empty.</p>
            <a href="{% url 'home' %}" class="checkout-btn">GO BACK SHOPPING</a>
        {% endif %}
    </div>

    </body>

</html>
