<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ product.name }} | CR7 Store</title>
    <style>
        /* Modern Dark Background */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        /* Glassmorphism Container */
        .container {
            display: flex;
            max-width: 1000px;
            width: 90%;
            padding: 40px;
            gap: 50px;
            
            /* Glass Effect */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Product Image Styling */
        .product-image {
            flex: 1;
            display: flex;
            align-items: center;
        }

        .product-image img {
            width: 100%;
            max-width: 450px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.4s ease;
        }

        .product-image img:hover {
            transform: scale(1.02);
        }

        /* Info Styling */
        .info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            background: linear-gradient(to right, #ffffff, #b3b3b3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .price {
            font-size: 28px;
            font-weight: 700;
            color: #00ffcc; /* Bright accent color */
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }

        p {
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
        }

        hr {
            border: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 25px 0;
        }

        .reviews {
            margin-bottom: 30px;
        }

        .stars {
            color: #ffcc00;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        /* Classy Button */
        button {
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(58, 123, 213, 0.4);
        }

        /* Premium Add to Cart Button Styling */
        .add-btn {
            display: inline-block;
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            color: white;
            text-decoration: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(58, 123, 213, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 10px;
        }

        .add-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 210, 255, 0.6);
            filter: brightness(1.1);
            letter-spacing: 3px; /* Subtle expansion effect */
        }

        .add-btn:active {
            transform: translateY(-1px);
        }

        /* Add a subtle glow effect to the button */
        .add-btn {
            position: relative;
            overflow: hidden;
        }

        .add-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(45deg);
            transition: 0.5s;
            pointer-events: none;
        }

        .add-btn:hover::after {
            left: 120%;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(58, 123, 213, 0.6);
            filter: brightness(1.1);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                padding: 20px;
                text-align: center;
            }
            .product-image img {
                max-width: 100%;
            }
        }
/* TOAST NOTIFICATION STYLING */
#cart-toast {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 2000;
    min-width: 280px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    opacity: 0;
    transform: translateX(100%); /* Start off-screen */
}

/* When the popup is active */
#cart-toast.show {
    opacity: 1;
    transform: translateX(0);
}

.toast-content {
    display: flex;
    align-items: center;
    gap: 15px;
    color: white;
    font-weight: 600;
}

.toast-content i {
    color: #00ffcc; /* Matches your price colors */
    font-size: 1.5rem;
}

/* The blue glow at the bottom of the toast */
#cart-toast::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    height: 4px;
    width: 100%;
    background: linear-gradient(90deg, #00d2ff, #3a7bd5);
    border-radius: 0 0 15px 15px;
}
}

    </style>
</head>
<body>

    <div class="container">
        <div class="product-image">
            <img src="{{ product.image.url }}" alt="{{ product.name }}">
        </div>
        
        <div class="info">
            <h1>{{ product.name }}</h1>
            <div class="price">₹{{ product.price }}</div>
            
            <p>{{ product.description }}</p>
            
            <hr>
            
            <div class="reviews">
                <h3>Reviews & Ratings</h3>
                <span class="stars">★ ★ ★ ★ ☆</span>
                <span style="margin-left: 10px; color: rgba(255,255,255,0.5);">(4.5/5)</span>
            </div>

            <!-- <button>Add to Cart</button> -->

            <!-- <a href="{% url 'add_to_cart' product.id %}" class="add-btn">ADD TO CART</a> -->

<a href="{% url 'add_to_cart' product.id %}" class="add-btn">ADD TO CART</a>
        
</div>

<center>

<div id="cart-toast">
    <div class="toast-content">
        <i class="fas fa-check-circle"></i>
        <span>SIUUU! Item added to cart.</span>
    </div>
</div>
</center>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const addBtn = document.querySelector('.add-btn'); // Ensure your button has this class

    if (addBtn) {
        addBtn.addEventListener('click', function(e) {
            e.preventDefault(); // Stop the page from redirecting
            
            const url = this.getAttribute('href');

            // 1. Send background request to Django
            fetch(url, {
                method: 'GET',
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            })
            .then(response => {
                // 2. Trigger the Popup Animation
                const toast = document.getElementById('cart-toast');
                toast.classList.add('show');

                // 3. Auto-hide after 3 seconds
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            })
            .catch(error => console.error('Error:', error));
        });
    }
});
</script>

</body>
</html>
